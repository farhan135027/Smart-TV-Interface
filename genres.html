<!DOCTYPE html> 
<html> 
<body> 
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTV</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js"></script>
  <style>
    #genres {
      margin: 40px auto;
      max-width: 1000px;
    }

    #genres p {
      color: white;
      margin-bottom: 30px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-gap: 4px;
    }

    .genre {
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      width: 200px;
    }

    .genre-image {
      display: block;
      width: 200px;
      height: auto;
    }

    .overlay {
      position: absolute;
      bottom: 200px;
      left: 0;
      right: 0;
      background-color: #000000;
      overflow: hidden;
      width: 200px;
      height: 0;
      transition: 0.5s ease;
      cursor: pointer;
    }

    .genre:hover .overlay {
      bottom: 0;
      height: 200px;
    }

    .genre-text {
      white-space: nowrap;
      color: white;
      font-size: 20px;
      position: absolute;
      overflow: hidden;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <!-- Top navigation bar -->
  <div id="topnav">
  <div>
  <button onclick="openSidebar()">
  <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="M3 18v-2h18v2Zm0-5v-2h18v2Zm0-5V6h18v2Z"/></svg>
  </button>
  </div>
  <div>
  <form action="">

  </label>
  </form>
  <a>
  <button>Izzat</button>
  </a>
  </div>
  </div>

  <div>

  <div>
    <button onclick="closeSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="M10 22 0 12 10 2l1.775 1.775L3.55 12l8.225 8.225Z"/></svg>
    </button>
  </div>
  </div>
  <a href="genres.html">Genres</a>
  <a href="watchlist.html">Watchlist</a>
  <a href="history.html">History</a>
  <a href="settings.html">Settings</a>
