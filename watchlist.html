<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
    <style>
      button:hover {
        cursor: pointer;
      }

      #wathlist {
        color: white;
        margin: 40px auto;
        max-width: 1000px;
      }

      #add {
        display: flex;
        justify-content: right;
      }

      #add button {
        background-color: rgb(231, 47, 47);
        border: none;
        color: white;
        padding: 8px 20px;
        border-radius: 6px;
        margin-bottom: 20px;
      }

      #grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 16px;
      }

      .item {
        border-radius: 12px;
        height: 200px;
        overflow: hidden;
        position: relative;
      }

      .item img {
        height: 100%;
        width: 100%;
      }
      
      .item a {
        align-items: center;
        background-color: rgba(0, 0, 0, 0.3);
        bottom: 0;
        display: none;
        fill: white;
        justify-content: center;
        left: 0;
        position: absolute;
        right: 0;
        top: 0;
      }

      .item:hover a {
        display: flex;
      }

      .item span {
        color: white;
        text-decoration: none;
      }

      .item p {
        bottom: -8px;
        color: white;
        left: 10px;
        position: absolute;
      }
    </style>
  </head>
  <body style="margin: 0; background-color: rgb(73, 92, 110)">
      <!-- Top navigation bar -->
      <div id="topnav">
        <div>
            <button onclick="openSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="M3 18v-2h18v2Zm0-5v-2h18v2Zm0-5V6h18v2Z"/></svg>
            </button>
        </div>
        <div>
            <form action="">
                <label for="">
                    <input type="text" placeholder="Search">
                </label>
            </form>
            <a href="account.html">
                <button>Izzat</button>
            </a>
        </div>
    </div>
    <!-- Side bar -->
    <div id="sidebar">
        <div>
            <div>
              <a href="index.html">Home</a>
                <div>
                    <button onclick="closeSidebar()">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="M10 22 0 12 10 2l1.775 1.775L3.55 12l8.225 8.225Z"/></svg>
                    </button>
                </div>
            </div>
            <a href="genres.html">Genres</a>
            <a href="watchlist.html">Watchlist</a>
            <a href="history.html">History</a>
            <a href="settings.html">Settings</a>
        </div>
    </div>
    <!-- Login modal -->
    <div id="login">
        <div>
            <div>
                <button onclick="closeLogin()">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="M6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5l5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6Z"/></svg>
                </button>
            </div>
            <div>
                <input type="text" placeholder="Email or phone number">
                <input type="password" placeholder="Password">
                <a href="index.html">
                    <button>Login</button>
                </a>
                <p>Not registered yet?</p>
                <button onclick="closeLogin(); openRegister()">Register</button>
            </div>
        </div>
    </div>
    <!-- Register modal -->
    <div id="register">
        <div>
            <div>
                <button onclick="closeRegister(); openLogin()">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="m12 20-8-8 8-8 1.425 1.4-5.6 5.6H20v2H7.825l5.6 5.6Z"/></svg>
                </button>
                <button onclick="closeRegister()">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24"><path d="M6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5l5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6Z"/>
                </button>
            </div>
            <div>
                <input type="text" placeholder="Email or phone number">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm password">
                <button onclick="closeRegister(); openLogin()">Register</button>
            </div>
        </div>
    </div>
    <!-- End -->
    <div id="wathlist">
      <p>Watchlist</p>
      <div id="add">
        <a>
          <button>Add +</button>
        </a>
      </div>
      <div id="grid">
        <div class="item">
          <img src="img/pussinboots-blogroll-1647280577032.png">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24">

            <span>Play All</span>
          </a>
          <p>Cartoon for Kids</p>
        </div>
        <div class="item">
          <img src="img/everything-everywhere-all-at-once-1651758455.jpg">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24">
              <path d="M8 19V5l11 7Z" />
            </svg>

          </a>

        </div>
        <div class="item">
          <img src="img/AAAAQYdQjzTNWEuDWlhUjdongxna5rgNHXtq3Jq1pN_iTxrPGm1EWpG5HR6sg_UOTLdpXTDUnGyWLu4MxqcTjPlyO6Q4s3XuDQO9_1CficTqd9k2ba1NiqgfRVTWI3eJKqSnfMk_gUqBMlF9logICeA040hVzgs.jpg">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24">
              <path d="M8 19V5l11 7Z" />
            </svg>
            <span>Play All</span>
          </a>
          <p>Weird Stuff</p>
        </div>
      </div>
    </div>
  </body>
</html>
